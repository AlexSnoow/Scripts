```bash
# =============================================================================
# GLOBAL SETTINGS
# =============================================================================

PARENT_JOB_NAME="BackupAll"

DOMAIN="localdomain.loc"

SMTP_SERVER="smtp.localdomain.loc"

# =============================================================================
# ARCHIVER
# =============================================================================

ARCHIVER_TYPE="tar.gz"

TAR_PATH="/usr/bin/tar"

GZIP_PATH="/usr/bin/gzip"

# Проверка целостности бинарников (опционально)
TAR_HASH=""
GZIP_HASH=""

# Дополнительные параметры tar
# Solaris-safe
TAR_OPTIONS=""

# gzip level:
# -1 fastest
# -9 maximum compression
GZIP_LEVEL="-5"

# =============================================================================
# PATHS
# =============================================================================

LOG_PATH_ROOT="/backup/logs"

LOG_DAYS_OLD=7

LOG_KEEP_COUNT=14

TMP_PATH="/backup/tmp"

# =============================================================================
# RECIPIENTS
# =============================================================================

ADMIN_IS="user1@head.localdomain.loc"

ADMIN_OS="user2@head.localdomain.loc"

ADMIN_MAIL="user3@head.localdomain.loc"

# =============================================================================
# JOB LIST
# =============================================================================

JOBS="
JOB1
JOB51
JOB52
JOB6
JOB3
"

# =============================================================================
# JOB1
# Архивация файлов по дате
# =============================================================================

JOB1_SOURCE="/data/JOB1"

JOB1_MODE="archive_by_date"

JOB1_ARCHIVE_PATTERN="{PCName}_{JobName}_{LastWriteTime}.tar.gz"

JOB1_EXCLUDE_TODAY=1

JOB1_EXCLUDE_FILE_PATTERN=""

JOB1_SOURCE_FILTER="*"

JOB1_LOCAL_DEST="/backup/local/JOB1"

JOB1_LOCAL_DAYS_OLD=30

JOB1_LOCAL_KEEP_COUNT=14

JOB1_REMOTE_DEST="/backup/remote"

JOB1_ERROR_LOG=1

# =============================================================================
# JOB51
# Индивидуальная архивация файлов
# =============================================================================

JOB51_SOURCE="/data/JOB51"

JOB51_MODE="individual_files"

JOB51_SOURCE_FILTER="file.log.20*"

JOB51_EXCLUDE_FILE_PATTERN="file.log"

JOB51_ARCHIVE_PATTERN="{PCName}_{JobName}_{SourceFileName}.tar.gz"

JOB51_LOCAL_DEST="/backup/local/JOB51"

JOB51_LOCAL_DAYS_OLD=30

JOB51_LOCAL_KEEP_COUNT=60

JOB51_REMOTE_DEST="/backup/remote"

JOB51_ERROR_LOG=1

# =============================================================================
# JOB52
# Индивидуальная архивация файлов
# =============================================================================

JOB52_SOURCE="/data/JOB52"

JOB52_MODE="individual_files"

JOB52_SOURCE_FILTER="file.20*.log"

JOB52_EXCLUDE_FILE_PATTERN="file.log"

JOB52_ARCHIVE_PATTERN="{PCName}_{JobName}_{SourceFileName}.tar.gz"

JOB52_LOCAL_DEST="/backup/local/JOB52"

JOB52_LOCAL_DAYS_OLD=30

JOB52_LOCAL_KEEP_COUNT=60

JOB52_REMOTE_DEST="/backup/remote"

JOB52_ERROR_LOG=1

# =============================================================================
# JOB6
# Индивидуальная архивация каталогов
# =============================================================================

JOB6_SOURCE="/data/JOB6"

JOB6_MODE="individual_folders"

JOB6_ARCHIVE_PATTERN="{PCName}_{JobName}_{SourceFolderName}.tar.gz"

JOB6_EXCLUDE_TODAY=1

JOB6_LOCAL_DEST="/backup/local/JOB6"

JOB6_LOCAL_DAYS_OLD=0

JOB6_LOCAL_KEEP_COUNT=2

JOB6_REMOTE_DEST="/backup/remote"

JOB6_ERROR_LOG=1

# =============================================================================
# JOB3
# Архивация всего каталога рекурсивно
# =============================================================================

JOB3_SOURCE="/data/JOB3"

JOB3_MODE="archive_all"

JOB3_ARCHIVE_PATTERN="{PCName}_{JobName}_{DATE}.tar.gz"

JOB3_EXCLUDE_TODAY=0

JOB3_EXCLUDE_FILE_PATTERN=""

JOB3_LOCAL_DEST="/backup/local/JOB3"

JOB3_LOCAL_DAYS_OLD=0

JOB3_LOCAL_KEEP_COUNT=2

JOB3_REMOTE_DEST="/backup/remote"

JOB3_ERROR_LOG=1
```
